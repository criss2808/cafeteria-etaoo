<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cafetería Escolar</title>
    <link rel="stylesheet" href="css/estilos.css" />
  </head>
  <body>
    <!-- PANTALLA DE CERRADO -->
    <div
      id="pantalla-cerrada"
      style="
        display: none;
        position: fixed;
        inset: 0;
        background: #1a5c52;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 40px;
        z-index: 999;
      "
    >
      <div style="font-size: 64px; margin-bottom: 20px">🔒</div>
      <h1
        style="
          color: white;
          font-size: 26px;
          font-weight: 600;
          margin-bottom: 12px;
        "
      >
        Caseta cerrada
      </h1>
      <p
        style="
          color: rgba(255, 255, 255, 0.65);
          font-size: 15px;
          line-height: 1.6;
          max-width: 280px;
        "
      >
        Por el momento no estamos recibiendo pedidos. Vuelve más tarde.
      </p>
      <div
        style="
          margin-top: 32px;
          background: rgba(255, 255, 255, 0.1);
          border-radius: 12px;
          padding: 14px 24px;
        "
      >
        <p style="color: rgba(255, 255, 255, 0.5); font-size: 13px">
          Cafetería ETAOO
        </p>
      </div>
    </div>

    <!-- ENCABEZADO -->
    <header class="header">
      <div>
        <h1 class="header-titulo">Cafetería Escolar</h1>
        <p class="header-aula" id="nombre-aula">Cargando aula...</p>
      </div>
      <button class="btn-carrito" onclick="verCarrito()">
        🛒 <span id="total-header">L 0.00</span>
        <span class="carrito-badge" id="cantidad-carrito">0</span>
      </button>
    </header>

    <!-- FILTROS DE CATEGORÍA -->
    <div class="categorias">
      <button class="cat-btn activo" onclick="filtrar('todos', this)">
        Todo
      </button>
      <button class="cat-btn" onclick="filtrar('comidas', this)">
        Comidas
      </button>
      <button class="cat-btn" onclick="filtrar('snacks', this)">Snacks</button>
      <button class="cat-btn" onclick="filtrar('bebidas', this)">
        Bebidas
      </button>
      <button class="cat-btn" onclick="filtrar('postres', this)">
        Postres
      </button>
    </div>

    <!-- LISTA DE PRODUCTOS -->
    <main id="lista-productos">
      <!-- Los productos se generan con JavaScript -->
    </main>

    <!-- BOTÓN FLOTANTE DE PEDIDO -->
    <div class="footer-fijo">
      <button class="btn-pedir" id="btn-pedir" onclick="irAConfirmar()">
        <span>Ver mi pedido</span>
        <span id="total-footer">L 0.00</span>
      </button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>

    <script src="js/menu.js"></script>
  </body>
</html>
