<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Panel Cafetería — ETAOO</title>
    <link rel="stylesheet" href="css/estilos.css" />
    <link rel="stylesheet" href="css/panel.css" />
  </head>
  <body>
    <header class="header">
      <div>
        <h1 class="header-titulo">Panel cafetería</h1>
        <p class="header-aula" id="fecha-hoy"></p>
      </div>
      <div class="header-stats">
        <div class="stat">
          <span class="stat-num" id="stat-pendientes">0</span>
          <span class="stat-label">pendientes</span>
        </div>
        <div class="stat">
          <span class="stat-num" id="stat-listos">0</span>
          <span class="stat-label">listos</span>
        </div>
      </div>
    </header>

    <!-- TABS -->
    <div class="tabs">
      <button class="tab activo" onclick="cambiarTab('pendientes', this)">
        En preparación
      </button>
      <button class="tab" onclick="cambiarTab('listos', this)">
        Listos hoy
      </button>
    </div>

    <!-- LISTA DE PEDIDOS -->
    <main id="lista-pedidos"></main>

    <!-- MODAL DE DETALLE -->
    <div
      class="modal-overlay oculto"
      id="modal-overlay"
      onclick="cerrarModal()"
    >
      <div class="modal" onclick="event.stopPropagation()">
        <div class="modal-header">
          <div>
            <p class="modal-numero" id="modal-numero">—</p>
            <p class="modal-meta" id="modal-meta">—</p>
          </div>
          <button class="modal-cerrar" onclick="cerrarModal()">✕</button>
        </div>
        <div id="modal-items"></div>
        <div class="modal-total-fila">
          <span>Total</span>
          <span class="modal-total" id="modal-total">—</span>
        </div>
        <button class="btn-listo" id="btn-listo" onclick="marcarListo()">
          Marcar como listo ✓
        </button>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>

    <script src="js/panel.js"></script>
  </body>
</html>
